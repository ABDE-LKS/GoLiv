name: wassali
description: "Production-ready local delivery platform for El Guerrara, Algeria."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^14.2.0
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  fl_chart: ^0.68.0
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  dio: ^5.7.0
  socket_io_client: ^3.0.2
  flutter_secure_storage: ^9.2.4
  logger: ^2.5.0
  pretty_dio_logger: ^1.4.0
  connectivity_plus: ^6.0.3
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.9
  freezed: ^2.5.2
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/icons/
    - assets/images/

